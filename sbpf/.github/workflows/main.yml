name: sbpf

on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        rust: [stable, beta, nightly]
    steps:
    - uses: actions/checkout@v1
    - name: Setup Rust (rustup)
      run: |
        rustup update ${{ matrix.rust }} --no-self-update
        rustup default ${{ matrix.rust }}
        rustup component add clippy
        rustup component add rustfmt
      shell: bash
    - name: Lint
      run: |
        cargo fmt --all -- --check
        cargo clippy --all --tests -- --deny=warnings
      if: matrix.rust == 'beta'
      shell: bash
    - name: Build and test
      run: |
        export RUSTFLAGS="-D warnings"
        cargo build --verbose
        cargo build --features="shuttle-test"
        cargo test --verbose
        cargo test --test exercise_instructions --verbose
        cargo test --features=debugger --verbose
      shell: bash
    - name: CLI - Lint
      run: |
        cargo fmt --all --manifest-path cli/Cargo.toml -- --check
        cargo clippy --all --tests --manifest-path cli/Cargo.toml -- --deny=warnings
      if: matrix.rust == 'beta'
      shell: bash
    - name: CLI - Build and test
      run: |
        export RUSTFLAGS="-D warnings"
        cargo build --manifest-path cli/Cargo.toml --verbose
        cargo test --manifest-path cli/Cargo.toml --verbose
      shell: bash
    - name: Check fuzz
      run: |
        export RUSTFLAGS="-D warnings"
        cargo install cargo-fuzz
        cargo fuzz build
      if: matrix.rust == 'nightly' && matrix.os != 'windows-latest'
      shell: bash
    - name: Benchmark
      run: RUSTFLAGS="-D warnings" cargo bench -- --nocapture
      if: matrix.rust == 'nightly' && matrix.os != 'windows-latest'
      shell: bash

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1
    - name: Setup Rust (rustup)
      run: |
        rustup update nightly --no-self-update
        rustup default nightly
        rustup component add llvm-tools-preview
      shell: bash
    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov
      shell: bash
    - name: Generate test coverage
      run: |
        cargo llvm-cov --lcov --output-path coverage.info
      shell: bash
    - name: Upload test coverage
      run: bash <(curl -s https://codecov.io/bash) -f coverage.info || echo "Codecov did not collect coverage reports"
      shell: bash

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    environment: prod
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
      contents: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        persist-credentials: false
    - name: Doc and package
      run: |
        cargo doc
        cargo package
      shell: bash
    - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe  # v1.0.4
      id: auth
    - name: Publish
      run: cargo publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
    - name: Generate SLSA provenance
      uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
      env:
        NODE_OPTIONS: "--max-http-header-size=32768"
      with:
        subject-path: target/package/*.crate
